<svg width="900" height="250"
viewBox="0 0 900 250"
xmlns="http://www.w3.org/2000/svg">

<defs>

<!-- Purple Background -->
<linearGradient id="bg"
x1="0%" y1="0%"
x2="100%" y2="100%">

<stop offset="0%" stop-color="#7C3AED"/>
<stop offset="100%" stop-color="#2E1065"/>

</linearGradient>

<!-- Main Text Gradient -->

<linearGradient id="titleGradient">
<stop offset="0%" stop-color="#E9D5FF"/>
<stop offset="50%" stop-color="#C084FC"/>
<stop offset="100%" stop-color="#A855F7"/>
</linearGradient>

<!-- Glow -->

<filter id="glow">

<feGaussianBlur
stdDeviation="4"
result="blur"/>

<feMerge>
<feMergeNode in="blur"/>
<feMergeNode in="SourceGraphic"/>
</feMerge>

</filter>

</defs>

<!-- BACKGROUND -->

<rect width="900"
height="250"
fill="url(#bg)"/>

<!-- CARD -->

<rect x="40"
y="35"
width="820"
height="180"
rx="22"
fill="#08060F"
stroke="#A855F7"
stroke-width="2"/>

<!-- LEFT WAVE -->

<path d="M70 210 C170 160 170 90 70 40"
stroke="#A855F7"
stroke-width="1.5"
fill="none"
opacity="0.4"/>

<path d="M80 210 C180 160 180 90 80 40"
stroke="#C084FC"
stroke-width="1"
fill="none"
opacity="0.25"/>

<path d="M90 210 C190 160 190 90 90 40"
stroke="#E9D5FF"
stroke-width="1"
fill="none"
opacity="0.15"/>

<!-- RIGHT WAVE -->

<path d="M830 210 C730 160 730 90 830 40"
stroke="#A855F7"
stroke-width="1.5"
fill="none"
opacity="0.4"/>

<path d="M820 210 C720 160 720 90 820 40"
stroke="#C084FC"
stroke-width="1"
fill="none"
opacity="0.25"/>

<path d="M810 210 C710 160 710 90 810 40"
stroke="#E9D5FF"
stroke-width="1"
fill="none"
opacity="0.15"/>

<!-- FLOATING SQUARES -->

<rect x="130"
y="90"
width="20"
height="20"
fill="#A855F7">

<animate
attributeName="y"
values="90;75;90"
dur="3s"
repeatCount="indefinite"/>

</rect>

<rect x="170"
y="120"
width="15"
height="15"
fill="#C084FC">

<animate
attributeName="y"
values="120;100;120"
dur="2.5s"
repeatCount="indefinite"/>

</rect>

<rect x="720"
y="90"
width="20"
height="20"
fill="#A855F7">

<animate
attributeName="y"
values="90;75;90"
dur="3s"
repeatCount="indefinite"/>

</rect>

<rect x="760"
y="120"
width="15"
height="15"
fill="#C084FC">

<animate
attributeName="y"
values="120;100;120"
dur="2.5s"
repeatCount="indefinite"/>

</rect>

<!-- TOP LINE -->

<line x1="300"
y1="80"
x2="600"
y2="80"
stroke="#A855F7"
stroke-width="2"
filter="url(#glow)"
stroke-dasharray="300"
stroke-dashoffset="300">

<animate
attributeName="stroke-dashoffset"
from="300"
to="0"
dur="2s"
fill="freeze"/>

</line>

<!-- GLOW DOT -->

<circle cx="450"
cy="80"
r="4"
fill="#F3E8FF"
filter="url(#glow)">

<animate
attributeName="opacity"
values="1;.3;1"
dur="2s"
repeatCount="indefinite"/>

</circle>

<!-- TITLE -->

<text x="450"
y="110"
text-anchor="middle"
fill="#FFFFFF"
font-size="30">

Build your

</text>

<!-- MAIN TITLE -->

<text x="450"
y="150"
text-anchor="middle"
fill="url(#titleGradient)"
font-size="42"
font-weight="700"
filter="url(#glow)">

Machine Learning Career

</text>

<!-- SUBTITLE -->

<text x="450"
y="190"
text-anchor="middle"
fill="#D1D5DB"
font-size="14">

Learn • Build • Innovate • Inspire

</text>

<!-- CONTACTS -->

<g transform="translate(120,220)">

<circle r="18"
stroke="#A855F7"
stroke-width="2"
fill="none"/>

<text x="-7"
y="5"
fill="white">
☎
</text>

<text x="30"
y="5"
fill="white"
font-size="13">

+20 1021619638

</text>

</g>

<g transform="translate(390,220)">

<circle r="18"
stroke="#A855F7"
stroke-width="2"
fill="none"/>

<text x="-8"
y="5"
fill="white">
✉
</text>

<text x="30"
y="5"
fill="white"
font-size="13">

rawdaelsayed389@gmail.com

</text>

</g>

<g transform="translate(670,220)">

<circle r="18"
stroke="#A855F7"
stroke-width="2"
fill="none"/>

<text x="-7"
y="5"
fill="white"
font-weight="bold">

in

</text>

<text x="30"
y="5"
fill="white"
font-size="13">

www.linkedin.com/in/rawda-elsayed-0b7b33333

</text>

</g>

</svg>
